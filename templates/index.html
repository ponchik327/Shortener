<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URL Shortener</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; padding: 2rem; }
    h1 { font-size: 1.6rem; margin-bottom: 2rem; }
    h2 { font-size: 1.1rem; margin-bottom: 1rem; color: #444; }
    .card {
      background: #fff;
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.1);
      max-width: 600px;
    }
    label { display: block; font-size: .85rem; color: #555; margin-bottom: .3rem; }
    input[type=text], input[type=url] {
      width: 100%;
      padding: .5rem .75rem;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: .95rem;
      margin-bottom: .75rem;
    }
    input:focus { outline: none; border-color: #4a90e2; }
    button {
      background: #4a90e2;
      color: #fff;
      border: none;
      padding: .55rem 1.2rem;
      border-radius: 5px;
      cursor: pointer;
      font-size: .95rem;
    }
    button:hover { background: #357abd; }
    #output {
      background: #1e1e1e;
      color: #d4d4d4;
      border-radius: 8px;
      padding: 1.25rem;
      max-width: 600px;
      min-height: 80px;
      font-family: monospace;
      font-size: .88rem;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .hint { font-size: .8rem; color: #888; margin-top: .3rem; }
  </style>
</head>
<body>
  <h1>URL Shortener</h1>

  <div class="card">
    <h2>Создать короткую ссылку</h2>
    <label for="longUrl">Длинный URL</label>
    <input type="url" id="longUrl" placeholder="https://example.com/very/long/path" />
    <label for="customCode">Кастомный код (необязательно)</label>
    <input type="text" id="customCode" placeholder="my-link" maxlength="32" />
    <p class="hint">4–32 символа: буквы, цифры, дефис, подчёркивание</p>
    <br />
    <button onclick="shorten()">Сократить</button>
  </div>

  <div class="card">
    <h2>Аналитика переходов</h2>
    <label for="analyticsCode">Короткий код</label>
    <input type="text" id="analyticsCode" placeholder="aB3xZ9kQ" />
    <button onclick="getAnalytics()">Получить аналитику</button>
  </div>

  <h2 style="max-width:600px;margin-bottom:.5rem;">Результат</h2>
  <div id="output">— здесь появится результат —</div>

  <script>
    const out = document.getElementById('output');

    function display(data) {
      out.textContent = JSON.stringify(data, null, 2);
    }

    function displayError(msg) {
      out.textContent = '❌ ' + msg;
    }

    async function shorten() {
      const longUrl = document.getElementById('longUrl').value.trim();
      const customCode = document.getElementById('customCode').value.trim();

      if (!longUrl) {
        displayError('Введите URL.');
        return;
      }

      const body = { long_url: longUrl };
      if (customCode) body.custom_code = customCode;

      try {
        const res = await fetch('/shorten', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok) {
          displayError(data.error || res.statusText);
          return;
        }
        display(data);
      } catch (e) {
        displayError(e.message);
      }
    }

    async function getAnalytics() {
      const code = document.getElementById('analyticsCode').value.trim();
      if (!code) {
        displayError('Введите короткий код.');
        return;
      }

      try {
        const res = await fetch('/analytics/' + encodeURIComponent(code));
        const data = await res.json();
        if (!res.ok) {
          displayError(data.error || res.statusText);
          return;
        }
        display(data);
      } catch (e) {
        displayError(e.message);
      }
    }
  </script>
</body>
</html>
